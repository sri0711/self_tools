<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
	<style>
		@keyframes dragonLoop {
			from { stroke-dashoffset: 100; }
			to { stroke-dashoffset: 0; }
		}
		@keyframes dragonLoopReverse {
			from { stroke-dashoffset: 0; }
			to { stroke-dashoffset: 100; }
		}
		.dragon-path-1 {
			stroke-dasharray: 100;
			animation: dragonLoop 3s ease-in-out infinite;
		}
		.dragon-path-2 {
			stroke-dasharray: 100;
			animation: dragonLoopReverse 3s ease-in-out infinite;
		}
		.base-path {
			opacity: 0.25;
		}
	</style>
	<!-- Faint base layer so the URL icon is always clearly visible -->
	<path class="base-path" d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
	<path class="base-path" d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
	
	<!-- Animated moving dashed layer -->
	<path class="dragon-path-1" d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
	<path class="dragon-path-2" d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
</svg>