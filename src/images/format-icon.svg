<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>
    @keyframes draw1 {
      0% { stroke-dashoffset: 8; }
      15%, 50% { stroke-dashoffset: 0; }
      65%, 100% { stroke-dashoffset: 8; }
    }
    @keyframes draw2 {
      0%, 15% { stroke-dashoffset: 8; }
      30%, 65% { stroke-dashoffset: 0; }
      80%, 100% { stroke-dashoffset: 8; }
    }
    @keyframes draw3 {
      0%, 30% { stroke-dashoffset: 8; }
      45%, 80% { stroke-dashoffset: 0; }
      95%, 100% { stroke-dashoffset: 8; }
    }
    .base-line { opacity: 0.2; }
    .anim-line-1 { stroke-dasharray: 8; animation: draw1 3s ease-in-out infinite; }
    .anim-line-2 { stroke-dasharray: 8; animation: draw2 3s ease-in-out infinite; }
    .anim-line-3 { stroke-dasharray: 8; animation: draw3 3s ease-in-out infinite; }
  </style>
  
  <!-- Outer Code Brackets (Static) -->
  <path d="M7 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2" />
  <path d="M17 4h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-2" />
  
  <!-- Faint Base Lines -->
  <line class="base-line" x1="8" y1="8" x2="16" y2="8" />
  <line class="base-line" x1="8" y1="12" x2="16" y2="12" />
  <line class="base-line" x1="8" y1="16" x2="16" y2="16" />
  
  <!-- Animated Typing Lines -->
  <line class="anim-line-1" x1="8" y1="8" x2="16" y2="8" />
  <line class="anim-line-2" x1="8" y1="12" x2="16" y2="12" />
  <line class="anim-line-3" x1="8" y1="16" x2="16" y2="16" />
</svg>